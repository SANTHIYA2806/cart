<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Items</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="https://github.com/SANTHIYA2806/Food-Verse/blob/main/src/main/resources/static/images/logo.jpg?raw=true">
    <style>
        .bottom-bar{
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            padding: 15px;
            box-shadow: 0px 0px 10px 10px rgba(0,0,0,0.1);
        }
        img{
            max-width: 100%;
            height: auto;
        }
        .card{
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="fixed-top nav-style">
            <div class="container d-flex align-items-center">
                <h2>Food<span style="color:var(--orange);">Spot</span></h2>
                <div class="d-flex ms-auto">
                    <a href="cartitems.html"><button id="cart-btn">Your Cart <i class="bi bi-cart"></i></button></a> 
                </div>
            </div>
        </nav>
    </div>

    <div class="container mt-5" id="cartitems" style="margin-bottom: 100px;">
    </div>

    <div class="bottom-bar d-flex flex-column flex-md-row justify-content-center align-items-center gap-3">
        <h3 id="total">Total :₹<span>0</span></h3>
        <button onclick="buyitems()" class="cartbtn">Buy Items</button>
    </div>
    <script>
       let cart = JSON.parse(localStorage.getItem("cart"))||[];
       let cartitems = document.getElementById("cartitems");
       let total = 0;
       
       cart.forEach((item,index)=>{
        let amount = item.price * item.quantity;
        total+=amount;
        
        cartitems.innerHTML += `
        <div class="card mb-3">
            <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <img src="${item.image}" class="img-fluid" style="width:80px; height:80px; object-fit:cover; border-radius:10px;">
                    <div>
                        <h4>${item.name}</h4>
                        <div class="d-flex align-items-center gap-2 mt-2">
                            <button class="btn btn-outline-dark rounded-circle px-2" onclick="decreaseQty(${index})">-</button>
                            <span>${item.quantity}</span>
                            <button class="btn btn-outline-dark rounded-circle px-2" onclick="increaseQty(${index})">+</button>
                        </div>
                        <h5 class="mt-2">₹${item.price} × ${item.quantity} = ₹${amount}</h5>
                    </div>
                </div>
                <button onclick="deleteItem(${index})" class="btn btn-danger"><i class="bi bi-trash"></i></button>
            </div>
        </div>`;
    });  
    
    function deleteItem(index){
        if(confirm("Delete this item?")){
            cart.splice(index,1);
            localStorage.setItem("cart",JSON.stringify(cart));
            location.reload();
        }
    }
    
    function increaseQty(index){
        cart[index].quantity++;
        localStorage.setItem("cart",JSON.stringify(cart));
        location.reload();
    }
    
    function decreaseQty(index){
        if(cart[index].quantity > 1){
            cart[index].quantity--;
            localStorage.setItem("cart",JSON.stringify(cart));
            location.reload();
        }
    }
    
    document.getElementById("total").innerHTML = "Total : ₹" + total;
    
    function buyitems(){
        alert("Order Placed Successfully");
        localStorage.removeItem("cart");
        location.reload();
    }
    </script>
</body>
</html>
